<!doctype html><html lang="zh">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/styles.css?v=12">
<link rel="stylesheet" href="/assets/site-header.css?v=12">
<script src="/assets/site-header.js?v=12" defer></script>

<title>Loading…</title>
</head>
<body>
<div id="site-header"></div>
<!-- Minimal placeholder while the reference is fetched -->
<section class="hero"><div class="hero-inner"><div class="hero-content">
  <figure style="margin:16px 0"><img src="/assets/write-in-zh.svg" alt="write-in zh" style="max-width:680px;width:100%;height:auto;border-radius:10px;border:1px solid var(--stroke);box-shadow:0 4px 16px rgba(0,0,0,.25)"></figure>
</div></div></section>
<script>
(function(){
  const RAW_URL = 'https://raw.githubusercontent.com/ErikM-FL/erik-morris-fl-2026-site/refs/heads/backup/index-zh.html';
  const LANG = 'zh';
  function $(sel, root=document){ return root.querySelector(sel); }

  async function syncFromReference(){
    try{
      const res = await fetch(RAW_URL, {cache:'no-store', credentials:'omit'});
      if(!res.ok){ console.warn('Sync: failed to fetch reference', res.status); return; }
      const text = await res.text();
      const parser = new DOMParser();
      const refDoc = parser.parseFromString(text, 'text/html');

      // capture current header to preserve it after body swap
      const currentHeader = document.querySelector('header.site-header');

      // swap entire body with reference body (max fidelity)
      document.body.innerHTML = refDoc.body ? refDoc.body.innerHTML : text;

      // ensure a header placeholder exists then re-attach original header
      const anchor = document.createElement('div');
      anchor.id = 'site-header';
      document.body.insertBefore(anchor, document.body.firstChild);
      if(currentHeader){ anchor.replaceWith(currentHeader); }

      // normalize write-in figure to local improved SVG
      const figImg = document.querySelector('img[src*="write-in-"]');
      if(figImg){ figImg.src = '/assets/write-in-'+LANG+'.svg'; figImg.setAttribute('alt','write-in '+LANG); }

      // also fix any link hrefs missing leading slash for root-level pages
      document.querySelectorAll('a[href^="pages/"]').forEach(a=>{ a.href = '/'+a.getAttribute('href'); });

      // title — use reference title if present
      const refTitle = refDoc.querySelector('title');
      if(refTitle) document.title = refTitle.textContent;

      // optional: bake to static
      if(new URL(location.href).searchParams.get('bake')==='1'){
        const blob = new Blob([document.documentElement.outerHTML], {type:'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = document.location.pathname.split('/').pop() || ('index-'+LANG+'.html');
        document.body.appendChild(a); a.click(); a.remove();
      }
    }catch(err){ console.warn('Sync: error', err); }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', syncFromReference); else syncFromReference();
})();
</script>
</body>
</html>
