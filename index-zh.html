<!doctype html><html lang="zh">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/styles.css?v=12">
<link rel="stylesheet" href="/assets/site-header.css?v=12">
<script src="/assets/site-header.js?v=12" defer></script>

<title>Loading…</title>
</head>
<body>
<div id="site-header"></div>
<!-- Placeholder hero so layout doesn't jump while fetching -->
<section class="hero"><div class="hero-inner"><div class="hero-content">
  <figure style="margin:16px 0"><img src="/assets/write-in-zh.svg" alt="write-in zh" style="max-width:680px;width:100%;height:auto;border-radius:10px;border:1px solid var(--stroke);box-shadow:0 4px 16px rgba(0,0,0,.25)"></figure>
</div></div></section>
<script>
(function(){
  const RAW_URL = 'https://raw.githubusercontent.com/ErikM-FL/erik-morris-fl-2026-site/refs/heads/backup/index-zh.html';
  const LANG = 'zh';
  function q(sel, root=document){ return root.querySelector(sel); }

  async function syncFromReference(){
    try{
      const res = await fetch(RAW_URL, {cache:'no-store', credentials:'omit'});
      if(!res.ok){ console.warn('Sync: fetch failed', res.status); return; }
      const text = await res.text();
      const parser = new DOMParser();
      const refDoc = parser.parseFromString(text, 'text/html');

      // --- Clean the reference: drop any header/placeholder/scripts so we don't re-inject header or JS ---
      refDoc.querySelectorAll('header, #site-header, script').forEach(n=>n.remove());

      // --- Preserve current header EXACTLY as-is ---
      const headerAnchor = q('#site-header');
      const injectedHeader = q('header.site-header');

      // Identify the node after which page content starts (keep everything before it untouched)
      const startNode = injectedHeader || headerAnchor || document.body.firstChild;

      // Remove everything after startNode (clear old content)
      let n = startNode ? startNode.nextSibling : document.body.firstChild;
      while(n){ const next = n.nextSibling; n.remove(); n = next; }

      // Append reference content 1:1 beneath the preserved header
      Array.from(refDoc.body.childNodes).forEach(node=>{
        if(node.nodeType===1 && node.tagName==='SCRIPT') return; // extra safety
        document.body.appendChild(node.cloneNode(true));
      });

      // Normalize only the HERO figure image to your local improved SVG
      const heroImg = q('section.hero figure img');
      if(heroImg){
        heroImg.src = '/assets/write-in-'+LANG+'.svg';
        heroImg.alt = 'write-in '+LANG;
      }

      // Fix relative links like "pages/..." → "/pages/..."
      document.querySelectorAll('a[href^="pages/"]').forEach(a=>{ a.href = '/'+a.getAttribute('href'); });

      // Title → reference
      const refTitle = refDoc.querySelector('title');
      if(refTitle) document.title = refTitle.textContent;

      // Optional bake
      if(new URL(location.href).searchParams.get('bake')==='1'){
        const blob = new Blob([document.documentElement.outerHTML], {type:'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = document.location.pathname.split('/').pop() || ('index-'+LANG+'.html');
        document.body.appendChild(a); a.click(); a.remove();
      }
    }catch(e){ console.warn('Sync error', e); }
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', syncFromReference);
  else syncFromReference();
})();
</script>
</body>
</html>
