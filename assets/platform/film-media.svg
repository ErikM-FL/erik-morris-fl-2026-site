<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" style="font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <!-- Simulated stock image background for film &amp; media jobs -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="640" height="420" fill="url(#bg)"/>
  <!-- Florida silhouette overlay -->
  <g transform="translate(350,120) scale(1.6)" opacity="0.25">
    <path d="M 60 60 L 180 60 L 220 100 L 200 130 L 140 140 L 120 170 L 100 170 L 90 150 L 60 150 Z" fill="#60a5fa" filter="url(#blur)"/>
  </g>
  <!-- Centered topic icon over map -->
  <g transform="translate(380,130)"><g transform="scale(0.9)"><rect x="10" y="40" width="120" height="70" rx="6" fill="#1c2541" stroke="#3a506b" stroke-width="3"/><rect x="10" y="10" width="120" height="30" fill="#3a506b"/><g fill="#f1f5f9"><rect x="14" y="14" width="16" height="12"/><rect x="34" y="14" width="16" height="12"/><rect x="54" y="14" width="16" height="12"/><rect x="74" y="14" width="16" height="12"/><rect x="94" y="14" width="16" height="12"/></g></g></g>
  <text x="20" y="400" fill="#9aa7b2" font-size="14">Background placeholder (replace with free stock photo related to film &amp; media jobs)</text>
</svg>