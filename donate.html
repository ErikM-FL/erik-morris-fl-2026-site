<script>
(function(){
  const dd=document.querySelector('.dropdown');
  const btn=document.getElementById('langBtn');
  if(btn && dd){
    btn.addEventListener('click',()=>{
      const exp = dd.getAttribute('aria-expanded')==='true';
      dd.setAttribute('aria-expanded', String(!exp));
      btn.setAttribute('aria-expanded', String(!exp));
    });
    document.addEventListener('click',(e)=>{
      if(!dd.contains(e.target)){
        dd.setAttribute('aria-expanded','false');
        btn.setAttribute('aria-expanded','false');
      }
    });
    document.addEventListener('keydown',(e)=>{
      if(e.key==='Escape'){
        dd.setAttribute('aria-expanded','false');
        btn.setAttribute('aria-expanded','false');
      }
    });
  }
})();
</script>

<script>
function googleTranslateElementInit(){
  new google.translate.TranslateElement({pageLanguage:'en', includedLanguages:'es,ht,zh-CN,vi,ko,pt', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
}

</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
(function(){
  function forceGTWhite(){
    var root=document.querySelector("#google_translate_element .goog-te-gadget-simple");
    if(!root) return;
    root.style.setProperty("color","#fff","important");
    root.querySelectorAll("a, span, *").forEach(function(n){
      n.style.setProperty("color","#fff","important");
    });
  }
  var host=document.getElementById("google_translate_element");
  if(host){
    try{ new MutationObserver(forceGTWhite).observe(host,{childList:true,subtree:true}); }catch(e){}
  }
  forceGTWhite();
  window.addEventListener("load", forceGTWhite);
})();
</script>
