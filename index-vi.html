(function(){
  const el=document.getElementById("ballotCanvas"); const fb=document.getElementById("ballotFallback");
  if(!el||!el.getContext){ return; }
  const ctx=el.getContext("2d"); if(!ctx){ return; }
  if(fb) fb.style.display="none";
  const W=el.width, H=el.height; const BG="#ffffff", FG="#000000";
  const labelFont = "700 18px Noto Sans SC,Noto Sans KR,Noto Sans,system-ui,Arial";
  const namePrint = "700 36px Noto Sans,system-ui,Arial";
  const nameCursive = "700 36px Patrick Hand,Noto Sans,system-ui,Arial";
  const languages=[{label:"Write-In"},{label:"Voto por escrito"},{label:"Ekri non"},{label:"手写填写"},{label:"Ghi tên"},{label:"기명"}];
  const nameLetters=["E","R","I","K"," ","M","O","R","R","I","S"];
  const modes=["print","cursive"];
  const margin=8; const border={x:1,y:1,w:W-2,h:H-2};
  const bubbleR=10; const bubbleC={x:margin+18,y:margin+46};
  const labelX=bubbleC.x+24; const baseline=bubbleC.y+3; const gap=14;
  function drawFrame(state){
    ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=FG; ctx.lineWidth=2; ctx.strokeRect(border.x,border.y,border.w,border.h);
    ctx.beginPath(); ctx.arc(bubbleC.x,bubbleC.y,bubbleR,0,Math.PI*2); ctx.stroke();
    if(state.filled){ ctx.fillStyle=FG; ctx.beginPath(); ctx.arc(bubbleC.x,bubbleC.y,bubbleR-3,0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle=FG; ctx.font=labelFont; ctx.textBaseline="alphabetic"; const label=languages[state.li].label; ctx.fillText(label,labelX,baseline);
    const lw=ctx.measureText(label).width; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(labelX,baseline+5); ctx.lineTo(labelX+lw,baseline+5); ctx.stroke();
    ctx.font=(state.mode==="print"?namePrint:nameCursive); const nameX=labelX+lw+gap; const typed=nameLetters.slice(0,state.letters).join(""); ctx.fillText(typed,nameX,baseline);
  }
  let modeIndex=0, li=0, letters=0, filled=false, phase="typing", holdUntil=0; let last=0;
  function nextScene(){ letters=0; filled=false; phase="typing"; }
  function tick(ts){ if(!last) last=ts; const dt=ts-last; last=ts; const st={mode:modes[modeIndex], li, letters, filled}; drawFrame(st);
    if(phase==="typing"){ if(letters<nameLetters.length){ letters+=dt/110; if(letters>nameLetters.length) letters=nameLetters.length; } else { filled=true; phase="hold"; holdUntil=ts+8000; } }
    else if(phase==="hold"){ if(ts>=holdUntil){ li++; if(li>=languages.length){ li=0; modeIndex=(modeIndex+1)%modes.length; } nextScene(); } }
    requestAnimationFrame(tick); }
  nextScene(); requestAnimationFrame(tick);
})();
</script>
