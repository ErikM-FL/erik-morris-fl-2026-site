<!doctype html><html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/styles.css?v=12">
<link rel="stylesheet" href="/assets/site-header.css?v=12">
<script src="/assets/site-header.js?v=12" defer></script>

<title>Loading…</title>
</head>
<body>
<div id="site-header"></div>
<!-- Minimal placeholder while the reference is fetched -->
<section class="hero"><div class="hero-inner"><div class="hero-content">
  <figure style="margin:16px 0"><img src="/assets/write-in-vi.svg" alt="write-in vi" style="max-width:680px;width:100%;height:auto;border-radius:10px;border:1px solid var(--stroke);box-shadow:0 4px 16px rgba(0,0,0,.25)"></figure>
</div></div></section>
<script>
(function(){
  const RAW_URL = 'https://raw.githubusercontent.com/ErikM-FL/erik-morris-fl-2026-site/refs/heads/backup/index-vi.html';
  const LANG = 'vi';
  function $(sel, root=document){ return root.querySelector(sel); }

  async function syncFromReference(){
    try{
      const res = await fetch(RAW_URL, {cache:'no-store', credentials:'omit'});
      if(!res.ok){ console.warn('Sync: failed to fetch reference', res.status); return; }
      const text = await res.text();
      const parser = new DOMParser();
      const refDoc = parser.parseFromString(text, 'text/html');

      // --- HEADER: preserve only our local header placeholder ---
      // Remove any header/placeholder that may have come from the reference
      refDoc.querySelectorAll('#site-header, header.site-header').forEach(n=>n.remove());

      // Prepare a new body fragment containing: our local header placeholder + reference content
      const frag = document.createDocumentFragment();
      // keep exactly one placeholder so /assets/site-header.js can inject once
      const headerAnchor = document.getElementById('site-header') || document.createElement('div');
      headerAnchor.id = 'site-header';

      // Recreate a clean <body> content: header anchor + ref body children
      frag.appendChild(headerAnchor);
      Array.from(refDoc.body.childNodes).forEach(n=>{
        // skip scripts from ref to avoid double-exec
        if(n.nodeType===1 && n.tagName==='SCRIPT') return;
        frag.appendChild(n.cloneNode(true));
      });

      // Replace current body children with the new fragment
      document.body.innerHTML='';
      document.body.appendChild(frag);

      // --- HERO FIGURE: normalize ONLY the hero figure image to our local SVG ---
      const heroFigImg = document.querySelector('section.hero figure img');
      if(heroFigImg){
        heroFigImg.src = '/assets/write-in-'+LANG+'.svg';
        heroFigImg.setAttribute('alt','write-in '+LANG);
      }

      // Fix relative links like "pages/..." to root-based "/pages/..."
      document.querySelectorAll('a[href^="pages/"]').forEach(a=>{ a.href = '/'+a.getAttribute('href'); });

      // Title — use reference
      const refTitle = refDoc.querySelector('title');
      if(refTitle) document.title = refTitle.textContent;

      // Bake support
      if(new URL(location.href).searchParams.get('bake')==='1'){
        const blob = new Blob([document.documentElement.outerHTML], {type:'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = document.location.pathname.split('/').pop() || ('index-'+LANG+'.html');
        document.body.appendChild(a); a.click(); a.remove();
      }
    }catch(err){ console.warn('Sync: error', err); }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', syncFromReference); else syncFromReference();
})();
</script>
</body>
</html>
