<!doctype html><html lang="pt">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/styles.css?v=12">
<link rel="stylesheet" href="/assets/site-header.css?v=12">
<script src="/assets/site-header.js?v=12" defer></script>
<style id="localized-overrides">
.ballot-block{ max-width:820px; margin:16px auto; padding:8px; border:1px solid var(--stroke); border-radius:8px; background:var(--card, transparent); overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.18);} 
.ballot-block img{ display:block; max-width:100%; height:auto; }
.ballot-block img[src*="write-in-ballot.gif"]{ margin-bottom:-10px; }
header.site-header{ position:relative; z-index:50; }
header.site-header .lang, header.site-header [data-lang-menu]{ position:relative; z-index:60; }
header.site-header img[src*="write-in.gif"]{ max-height:28px; width:auto; margin-inline:8px; flex-shrink:0; }
header.site-header .header-row{ display:flex; align-items:center; gap:8px; }
</style>
<title>Loading…</title>
</head>
<body>
<div id="site-header"></div>
<section class="hero"><div class="hero-inner"><div class="hero-content">
  <figure style="margin:16px 0"><img src="/assets/write-in-pt.svg" alt="write-in pt" style="max-width:680px;width:100%;height:auto;border-radius:10px;border:1px solid var(--stroke);box-shadow:0 4px 16px rgba(0,0,0,.25)"></figure>
</div></div></section>

<script>
(function(){
  const RAW_URL = 'https://raw.githubusercontent.com/ErikM-FL/erik-morris-fl-2026-site/refs/heads/backup/index-pt.html';
  const LANG = 'pt';
  const MAX_WAIT = 2500;

  const q = (sel, root=document)=> root.querySelector(sel);
  const qa = (sel, root=document)=> Array.from(root.querySelectorAll(sel));

  function waitForHeader(){
    return new Promise(resolve=>{
      const t0 = performance.now();
      (function tick(){
        const injected = q('header.site-header');
        if(injected) return resolve(injected);
        if(performance.now()-t0>MAX_WAIT) return resolve(null);
        requestAnimationFrame(tick);
      })();
    });
  }

  function moveHeaderGif(){
    try{
      const header = q('header.site-header'); if(!header) return;
      const gif = header.querySelector('img[src*="write-in.gif"]');
      const emtest = header.querySelector('img[src*="emtest.png"]');
      if(gif && emtest && emtest.parentNode){ emtest.parentNode.insertBefore(gif, emtest.nextSibling); }
    }catch(_e){}
  }

  async function syncFromReference(){
    try{
      await waitForHeader();
      moveHeaderGif();

      const res = await fetch(RAW_URL, {cache:'no-store', credentials:'omit'});
      if(!res.ok){ console.warn('Sync: fetch failed', res.status); return; }
      const text = await res.text();
      const parser = new DOMParser();
      const refDoc = parser.parseFromString(text, 'text/html');

      const frag = document.createDocumentFragment();
      const refHero = q('section.hero', refDoc);
      if(refHero){
        let node = refHero;
        while(node){
          if(!(node.nodeType===1 && node.tagName==='SCRIPT')) frag.appendChild(node.cloneNode(true));
          node = node.nextSibling;
        }
      } else {
        qa('script', refDoc.body).forEach(s=>s.remove());
        frag.appendChild(refDoc.body.cloneNode(true));
      }

      const injectedHeader = q('header.site-header') || q('#site-header');
      let n = injectedHeader ? injectedHeader.nextSibling : document.body.firstChild;
      while(n){ const next=n.nextSibling; n.remove(); n=next; }

      document.body.appendChild(frag);

      const heroImg = q('section.hero figure img');
      if(heroImg){ heroImg.src = '/assets/write-in-'+LANG+'.svg'; heroImg.alt = 'write-in '+LANG; }

      const refBallotImg = q('img[src*="write-in-ballot.gif"]', refDoc);
      const curBallotImg = q('img[src*="write-in-ballot.gif"]');
      if(refBallotImg && !curBallotImg){
        let container = refBallotImg.closest('figure, section, div') || refBallotImg;
        let clone = container.cloneNode(true);
        clone.classList.add('ballot-block');
        clone.querySelectorAll('img').forEach(img=>{
          if(img.src.includes('write-in-ballot.gif')){ img.src='/assets/write-in-ballot.gif'; img.alt = img.alt || 'write-in ballot'; }
        });
        const hero = q('section.hero');
        if(hero && hero.parentNode) hero.parentNode.insertBefore(clone, hero.nextSibling);
        else document.body.appendChild(clone);
      } else if(curBallotImg) {
        const container = curBallotImg.closest('figure, section, div');
        if(container) container.classList.add('ballot-block');
      }

      qa('a[href^="pages/\"]').forEach(a=> a.href = '/'+a.getAttribute('href'));

      const refTitle = q('title', refDoc); if(refTitle) document.title = refTitle.textContent;

      if(new URL(location.href).searchParams.get('bake')==='1'){
        const blob = new Blob([document.documentElement.outerHTML], {type:'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = document.location.pathname.split('/').pop() || ('index-'+LANG+'.html');
        document.body.appendChild(a); a.click(); a.remove();
      }
    }catch(e){ console.warn('Sync error', e); }
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', syncFromReference);
  else syncFromReference();
})();
</script>

</body>
</html>
