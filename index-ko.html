<!doctype html><html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/styles.css?v=12">
<link rel="stylesheet" href="/assets/site-header.css?v=12">
<script src="/assets/site-header.js?v=12" defer></script>

<title>Loading…</title>
</head>
<body>
<div id="site-header"></div>
<!-- Placeholder hero so layout doesn't jump while fetching -->
<section class="hero"><div class="hero-inner"><div class="hero-content">
  <figure style="margin:16px 0"><img src="/assets/write-in-ko.svg" alt="write-in ko" style="max-width:680px;width:100%;height:auto;border-radius:10px;border:1px solid var(--stroke);box-shadow:0 4px 16px rgba(0,0,0,.25)"></figure>
</div></div></section>
<script>
(function(){
  const RAW_URL = 'https://raw.githubusercontent.com/ErikM-FL/erik-morris-fl-2026-site/refs/heads/backup/index-ko.html';
  const LANG = 'ko';
  const MAX_WAIT = 2000; // ms to wait for header injection

  function q(sel, root=document){ return root.querySelector(sel); }
  function qa(sel, root=document){ return Array.from(root.querySelectorAll(sel)); }

  function waitForHeader(){
    return new Promise(resolve=>{
      const t0 = performance.now();
      (function tick(){
        const hasInjected = !!q('header.site-header');
        const hasAnchor = !!q('#site-header');
        if(hasInjected || hasAnchor) return resolve();
        if(performance.now()-t0 > MAX_WAIT) return resolve();
        requestAnimationFrame(tick);
      })();
    });
  }

  async function syncFromReference(){
    try{
      // Ensure header has been injected before we touch the body
      await waitForHeader();

      const res = await fetch(RAW_URL, {cache:'no-store', credentials:'omit'});
      if(!res.ok){ console.warn('Sync: fetch failed', res.status); return; }
      const text = await res.text();
      const parser = new DOMParser();
      const refDoc = parser.parseFromString(text, 'text/html');

      // Build a clean fragment that starts at the first hero section to avoid any header/nav above it
      const frag = document.createDocumentFragment();
      const refHero = q('section.hero', refDoc);
      if(refHero){
        // append from hero to end of ref body
        let node = refHero;
        while(node){
          // skip scripts to avoid re-executing
          if(!(node.nodeType===1 && node.tagName==='SCRIPT')){
            frag.appendChild(node.cloneNode(true));
          }
          node = node.nextSibling;
        }
      } else {
        // fallback: use entire ref body without scripts
        qa('script', refDoc.body).forEach(s=>s.remove());
        frag.appendChild(refDoc.body.cloneNode(true));
      }

      // Remove everything after the preserved header area
      const injectedHeader = q('header.site-header');
      const headerAnchor = q('#site-header');
      const startNode = injectedHeader || headerAnchor || document.body.firstChild;
      let n = startNode ? startNode.nextSibling : document.body.firstChild;
      while(n){ const next = n.nextSibling; n.remove(); n = next; }

      // Inject the cleaned reference content under the header
      document.body.appendChild(frag);

      // Normalize ONLY the hero figure image (header logo remains untouched)
      const heroImg = q('section.hero figure img');
      if(heroImg){ heroImg.src = '/assets/write-in-'+LANG+'.svg'; heroImg.alt = 'write-in '+LANG; }

      // Fix root-relative links
      qa('a[href^="pages/\"]').forEach(a=>{ a.href = '/'+a.getAttribute('href'); });

      const refTitle = q('title', refDoc); if(refTitle) document.title = refTitle.textContent;

      // Optional bake
      if(new URL(location.href).searchParams.get('bake')==='1'){
        const blob = new Blob([document.documentElement.outerHTML], {type:'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = document.location.pathname.split('/').pop() || ('index-'+LANG+'.html');
        document.body.appendChild(a); a.click(); a.remove();
      }
    }catch(e){ console.warn('Sync error', e); }
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', syncFromReference);
  else syncFromReference();
})();
</script>
</body>
</html>
