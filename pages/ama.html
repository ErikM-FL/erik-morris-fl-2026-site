<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ask Me Anything (AMA)</title>
  <link rel="stylesheet" href="../styles.css?v=12">
  <link rel="stylesheet" href="/assets/site-header.css?v=12">
  <script src="/assets/site-header.js?v=12" defer></script>
  <style>
    .form-wrap{max-width:900px;margin:18px auto;padding:0 16px}
    .form-card{background:#0f1a38;border:1px solid var(--stroke);border-radius:12px;padding:16px}
    .form-row{display:grid;gap:6px;margin-bottom:12px}
    .inline{grid-template-columns:1fr 1fr;gap:12px}
    label{font-weight:700}
    input[type=text],input[type=email],textarea{background:#0a1023;color:#e6edf7;border:1px solid #2b3a51;border-radius:8px;padding:10px}
    .btn.primary{display:inline-block;background:#14345c;color:#e6f2ff;text-decoration:none;padding:10px 14px;border-radius:10px;border:1px solid #2b4772;font-weight:700}
    .hint{color:#9fb3d9;font-size:.95rem}
  </style>
<script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div id="site-header"></div>
  <section class="hero"><div class="hero-inner"><div class="hero-content">
    <p class="kicker">AMA — Ask Me Anything</p>
    <h2>What policy would you like to discuss?</h2>
  </div></div></section>

  <div class="form-wrap">
    <div class="form-card">
      <form id="amaForm" autocomplete="on">
        <div class="form-row inline">
          <div>
            <label for="aName">Full name <span aria-hidden="true">*</span></label>
            <input id="aName" name="name" type="text" required>
          </div>
          <div>
            <label for="aEmail">Email <span aria-hidden="true">*</span></label>
            <input id="aEmail" name="email" type="email" required>
          </div>
        </div>
        <div class="form-row inline">
          <div>
            <label for="aCounty">County</label>
            <input id="aCounty" name="county" type="text" placeholder="e.g., Bay, Orange, Broward">
          </div>
          <div>
            <label for="aPolicy">Policy / topic you want to ask about</label>
            <input id="aPolicy" name="policy" type="text" placeholder="e.g., HEARTH, FIFA, veterans care">
          </div>
        </div>
        <div class="form-row">
          <label for="aMsg">Your question</label>
          <textarea id="aMsg" name="message" rows="8" placeholder="Ask your question here."></textarea>
        </div>
        <div>
          <button class="btn primary" type="submit">Send</button>
        </div>
        <noscript><p class="hint">JavaScript is required to submit this form.</p></noscript>
      </form>
    </div>
  </div>

  <footer class="footer"><div class="footer-inner">Paid for by Erik Morris, Write‑In Candidate for Florida Governor (2026). Excess funds are reinvested into Florida communities.</div></footer>

  <script>
    (function(){
      const parts = ['erikmorris4','FLgov','@','gmail','.com'];
      const to = parts[0]+parts[1]+parts[2]+parts[3]+parts[4];
      document.getElementById('amaForm').addEventListener('submit', function(e){
        e.preventDefault();
        const name = document.getElementById('aName').value.trim();
        const email = document.getElementById('aEmail').value.trim();
        const county = document.getElementById('aCounty').value.trim();
        const policy = document.getElementById('aPolicy').value.trim();
        const msg = document.getElementById('aMsg').value.trim();
        const subject = 'AMA submission — '+(name||'');
        const body = `Name: ${name}
Email: ${email}
County: ${county}
Policy/topic: ${policy}

Question:
${msg}`;
        window.location.href = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      });
    })();
  </script>
</body>
</html>
