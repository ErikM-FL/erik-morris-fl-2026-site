
<!doctype html>
<html lang="en">
<head>

<body>
  <div class="wrapper">

      <div class="filmstrip">

      <div class="card"><img class="thumb" src="../assets/platform/education-nutrition.png" alt="Education & Nutrition — school + apple"></div>

      <div class="card"><img class="thumb" src="../assets/platform/neutrality.png" alt="Neutrality — filled Florida"></div>
      <div class="card"><img class="thumb" src="../assets/platform/safe-harbor.png" alt="Safe Harbor — legal scales"></div>
      <div class="card"><img class="thumb" src="../assets/platform/second-amendment-intregrity.png" alt="Second Amendment Integrity — shield"></div>
      <div class="card"><img class="thumb" src="../assets/platform/veterans-care.png" alt="Veterans Care — saluting soldier"></div>
