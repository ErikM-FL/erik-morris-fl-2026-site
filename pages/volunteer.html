<!doctype html>
<html lang="en">
<head>
  <title>Volunteer — Get Involved (2026)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../styles.css?v=12">
  <link rel="stylesheet" href="/assets/site-header.css?v=12">
  <script src="/assets/site-header.js?v=12" defer></script>
  <style>
    .form-wrap{max-width:900px;margin:18px auto;padding:0 16px}
    .form-card{background:#0f1a38;border:1px solid var(--stroke);border-radius:12px;padding:16px}
    .form-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .form-row{display:grid;gap:6px;margin-bottom:12px}
    .inline{grid-template-columns:1fr 1fr;gap:12px}
    label{font-weight:700}
    input[type=text],input[type=email],select,textarea{background:#0a1023;color:#e6edf7;border:1px solid #2b3a51;border-radius:8px;padding:10px}
    .btn.primary{display:inline-flex;align-items:center;gap:10px;background:#14345c;color:#e6f2ff;text-decoration:none;padding:10px 14px;border-radius:10px;border:1px solid #2b4772;font-weight:700}
    .status{margin-top:10px;font-size:.95rem}
    .status.ok{color:#b7ffbf}
    .status.err{color:#ffb7b7}
    .optrow{display:flex;align-items:center;gap:10px;margin-top:8px}
    .hint{color:#9fb3d9;font-size:.95rem}
    @media(min-width:900px){.form-grid{grid-template-columns:1.1fr .9fr}}
  </style>
</head>
<body>
  <div id="site-header"></div>
  <section class="hero"><div class="hero-inner"><div class="hero-content">
    <p class="kicker">Volunteer — 2026</p>
    <h2>Pitch in where it helps the most.</h2>
  </div></div></section>

  <div class="form-wrap">
    <div class="form-card">
      <form id="volForm" autocomplete="on" aria-describedby="volStatus">
        <div class="form-grid">
          <div>
            <div class="form-row inline">
              <div>
                <label for="vName">Full name <span aria-hidden="true">*</span></label>
                <input id="vName" name="name" type="text" required>
              </div>
              <div>
                <label for="vEmail">Email <span aria-hidden="true">*</span></label>
                <input id="vEmail" name="email" type="email" required>
              </div>
            </div>
            <div class="form-row inline">
              <div>
                <label for="vCounty">County</label>
                <input id="vCounty" name="county" type="text" placeholder="e.g., Leon, Miami-Dade">
              </div>
              <div>
                <label for="vAvail">Availability</label>
                <select id="vAvail" name="availability">
                  <option value="Weekdays">Weekdays</option>
                  <option value="Evenings">Evenings</option>
                  <option value="Weekends">Weekends</option>
                  <option value="Flexible">Flexible</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <label>Preferred Role(s)</label>
              <div class="chk-group" role="group" aria-label="Preferred roles">
                <label><input type="checkbox" name="roles" value="Campaign Management"> Campaign Management</label>
                <label><input type="checkbox" name="roles" value="Outreach and Canvasing"> Outreach and Canvasing</label>
                <label><input type="checkbox" name="roles" value="Media Development"> Media Development</label>
                <label><input type="checkbox" name="roles" value="Website Development"> Website Development</label>
                <label><input type="checkbox" name="roles" value="Community Outreach"> Community Outreach</label>
              </div>
            </div>
          </div>
          <div>
            <div class="form-row">
              <label for="vMsg">Tell us a little about your interests (optional)</label>
              <textarea id="vMsg" name="message" rows="8" placeholder="Share any relevant experience, schedule notes, or ideas."></textarea>
            </div>
          </div>
        </div>
        <div class="optrow">
          <button class="btn primary" type="submit" id="vSend">Send</button>
          <label><input type="checkbox" id="vSub" name="subscribe"> (Optional) Please add my email address to Erik's mailing list.</label>
        </div>
        <div id="volStatus" class="status" role="status" aria-live="polite"></div>
        <noscript><p class="hint">JavaScript is required to submit this form.</p></noscript>
      </form>
    </div>
  </div>

  <footer class="footer"><div class="footer-inner">Paid for by Erik Morris, Write‑In Candidate for Florida Governor (2026). Excess funds are reinvested into Florida communities.</div></footer>

  <script>
    (function(){
      const f = document.getElementById('volForm');
      const status = document.getElementById('volStatus');
      f.addEventListener('submit', async (e)=>{
        e.preventDefault();
        status.textContent = 'Sending…'; status.className='status';
        const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(x=>x.value);
        const payload = {
          name: document.getElementById('vName').value.trim(),
          email: document.getElementById('vEmail').value.trim(),
          county: document.getElementById('vCounty').value.trim(),
          availability: document.getElementById('vAvail').value,
          roles,
          message: document.getElementById('vMsg').value.trim(),
          subscribe: document.getElementById('vSub').checked
        };
        try{
          const res = await fetch('/api/volunteer', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
          const data = await res.json();
          if(res.ok){ status.textContent = 'Thanks! Your message has been sent.'; status.className='status ok'; f.reset(); }
          else { status.textContent = data.error || 'There was an error. Please try again later.'; status.className='status err'; }
        }catch(err){ status.textContent='Network error. Please try again later.'; status.className='status err'; }
      });
    })();
  </script>
</body>
</html>
